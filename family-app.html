<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Our Family</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f7f4ef; --card:#ffffff; --dark:#1c1a17; --muted:#8c8278;
    --border:#e8e2d8; --shadow:rgba(28,26,23,0.07);
    --terra:#c4846a; --terra-light:#f5e8e3;
    --sage:#7a9e7e;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Jost',sans-serif; background:var(--bg); color:var(--dark); min-height:100vh; }

  .topbar { background:var(--card); border-bottom:1px solid var(--border); padding:14px 18px 12px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 16px var(--shadow); }
  .app-title { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:400; line-height:1.1; }
  .app-title em { font-style:italic; color:var(--terra); }
  .app-names { font-size:0.58rem; text-transform:uppercase; letter-spacing:0.12em; color:var(--muted); margin-top:2px; }
  .sync-wrap { display:flex; align-items:center; gap:5px; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--sage); }
  .sync-dot.off { background:#e0a060; }
  .sync-label { font-size:0.6rem; color:var(--muted); }

  .main-tabs { display:flex; background:var(--card); border-bottom:1px solid var(--border); position:sticky; top:63px; z-index:99; }
  .main-tab { flex:1; padding:9px 4px; text-align:center; font-size:0.58rem; font-weight:500; text-transform:uppercase; letter-spacing:0.04em; color:var(--muted); cursor:pointer; border:none; border-bottom:2px solid transparent; background:none; font-family:'Jost',sans-serif; transition:all 0.2s; }
  .main-tab.active { color:var(--dark); border-bottom-color:var(--terra); }
  .tab-badge { display:inline-block; background:var(--terra); color:white; font-size:0.5rem; font-weight:600; border-radius:10px; padding:1px 5px; margin-left:3px; vertical-align:middle; line-height:1.4; }
  .item.new-item { border-color:#a0b4d8; background:#eef2ff; }
  .item.new-item .item-text { color:var(--dark); }
  .new-dot { width:7px; height:7px; border-radius:50%; background:#6a8caf; flex-shrink:0; }

  .view { display:none; padding:18px 16px 80px; }
  .view.active { display:block; }

  .add-row { display:flex; gap:9px; margin-bottom:18px; }
  .add-input { flex:1; border:1.5px solid var(--border); border-radius:12px; padding:12px 14px; font-family:'Jost',sans-serif; font-size:0.9rem; color:var(--dark); background:var(--card); outline:none; transition:border-color 0.2s; }
  .add-input:focus { border-color:var(--terra); }
  .add-input::placeholder { color:#ccc; }
  .add-btn { width:46px; height:46px; background:var(--dark); color:white; border:none; border-radius:12px; font-size:1.4rem; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:opacity 0.15s; }
  .add-btn:active { opacity:0.7; }

  .item { display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:13px 14px; margin-bottom:8px; }
  .item.done { opacity:0.45; }
  .item-check { width:26px; height:26px; border:2px solid var(--border); border-radius:7px; flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer; background:white; transition:all 0.15s; }
  .item.done .item-check { background:var(--sage); border-color:var(--sage); }
  .item.done .item-check::after { content:''; width:11px; height:6px; border-left:2px solid white; border-bottom:2px solid white; transform:rotate(-45deg) translateY(-1px); display:block; }
  .item-text { flex:1; font-size:0.9rem; line-height:1.3; }
  .item.done .item-text { text-decoration:line-through; color:var(--muted); }
  .item-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .item-del { width:26px; height:26px; border:1px solid var(--border); border-radius:50%; background:none; cursor:pointer; font-size:0.85rem; color:var(--muted); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; }
  .item-del:active { background:#fde8e8; border-color:#e08080; color:#c04040; }
  .item-edit { width:26px; height:26px; border:1px solid var(--border); border-radius:50%; background:none; cursor:pointer; font-size:0.75rem; color:var(--muted); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.15s; }
  .item-edit:active { background:var(--terra-light); border-color:var(--terra); color:var(--terra); }
  .item-text-input { border:none; background:none; font-family:'Jost',sans-serif; font-size:0.9rem; color:var(--dark); flex:1; outline:none; border-bottom:1.5px solid var(--terra); padding-bottom:1px; min-width:0; }
  /* BASIC LIST */
  .basic-list-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; margin-top:4px; }
  .basic-list-title { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); }
  .reset-btn { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--terra); background:none; border:1px solid var(--terra); border-radius:20px; padding:4px 10px; cursor:pointer; font-family:'Jost',sans-serif; transition:all 0.15s; }
  .reset-btn:active { background:var(--terra-light); }
  .basic-divider { margin:14px 0 10px; border:none; border-top:1px solid var(--border); }

  .cat-scroll { display:flex; gap:7px; overflow-x:auto; padding-bottom:3px; margin-bottom:14px; scrollbar-width:none; }
  .cat-scroll::-webkit-scrollbar { display:none; }
  .cat-chip { padding:6px 13px; border-radius:20px; font-size:0.67rem; font-weight:500; text-transform:uppercase; letter-spacing:0.08em; cursor:pointer; white-space:nowrap; border:1px solid var(--border); background:none; color:var(--muted); font-family:'Jost',sans-serif; transition:all 0.15s; display:flex; align-items:center; gap:5px; }
  .cat-chip.active { background:var(--dark); color:white; border-color:var(--dark); }
  .cat-chip-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

  .section-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .section-title { font-family:'Playfair Display',serif; font-size:1.05rem; }
  .section-count { font-size:0.62rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; }

  .clear-btn { width:100%; padding:11px; border:1.5px dashed var(--border); border-radius:12px; background:none; font-family:'Jost',sans-serif; font-size:0.78rem; color:var(--muted); cursor:pointer; text-align:center; transition:all 0.15s; margin-top:4px; }
  .clear-btn:active { background:var(--terra-light); border-color:var(--terra); color:var(--terra); }

  .empty { text-align:center; padding:36px 20px; color:var(--muted); font-size:0.83rem; line-height:1.7; }
  .empty-icon { font-size:1.8rem; margin-bottom:8px; opacity:0.35; display:block; }

  /* LISTS MANAGEMENT */
  .lists-head { font-family:'Playfair Display',serif; font-size:1.05rem; margin-bottom:16px; }
  .list-row { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:11px 13px; margin-bottom:8px; }
  .color-swatch { width:24px; height:24px; border-radius:7px; flex-shrink:0; cursor:pointer; border:2px solid transparent; transition:border-color 0.15s; }
  .color-swatch:active { border-color:var(--dark); }
  .list-name-inp { flex:1; border:none; background:none; font-family:'Jost',sans-serif; font-size:0.88rem; color:var(--dark); outline:none; border-bottom:1px solid transparent; transition:border-color 0.2s; min-width:0; }
  .list-name-inp:focus { border-bottom-color:var(--terra); }
  .add-list-btn { width:100%; padding:12px; border:1.5px dashed var(--border); border-radius:12px; background:none; font-family:'Jost',sans-serif; font-size:0.8rem; color:var(--muted); cursor:pointer; text-align:center; margin-bottom:12px; transition:all 0.15s; }
  .add-list-btn:active { background:var(--terra-light); border-color:var(--terra); color:var(--terra); }
  .lists-hint { font-size:0.7rem; color:var(--muted); text-align:center; line-height:1.6; }

  /* COLOR MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:500; display:none; align-items:flex-end; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--card); border-radius:20px 20px 0 0; padding:22px 20px 36px; width:100%; }
  .modal-title { font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:14px; }
  .color-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:10px; }
  .color-opt { width:100%; aspect-ratio:1; border-radius:10px; cursor:pointer; border:3px solid transparent; transition:border-color 0.15s; }
  .color-opt.sel { border-color:var(--dark); }
  .modal-close { width:100%; padding:13px; background:var(--dark); color:white; border:none; border-radius:12px; font-family:'Jost',sans-serif; font-size:0.88rem; cursor:pointer; margin-top:14px; }
  /* EDIT BLOCK MODAL */
  .edit-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:600; display:none; align-items:flex-end; justify-content:center; }
  .edit-modal-overlay.show { display:flex; }
  .edit-modal { background:var(--card); border-radius:20px 20px 0 0; padding:22px 20px 40px; width:100%; max-width:500px; }
  .edit-modal-title { font-family:'Playfair Display',serif; font-size:1rem; margin-bottom:16px; }
  .edit-field { margin-bottom:14px; }
  .edit-label { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:6px; display:block; }
  .edit-input { width:100%; border:1.5px solid var(--border); border-radius:10px; padding:11px 13px; font-family:'Jost',sans-serif; font-size:0.9rem; color:var(--dark); outline:none; background:var(--card); transition:border-color 0.2s; }
  .edit-input:focus { border-color:var(--terra); }
  .edit-select { width:100%; border:1.5px solid var(--border); border-radius:10px; padding:11px 13px; font-family:'Jost',sans-serif; font-size:0.9rem; color:var(--dark); outline:none; background:var(--card); }
  .edit-btns { display:flex; gap:10px; margin-top:6px; }
  .edit-save { flex:1; padding:13px; background:var(--dark); color:white; border:none; border-radius:12px; font-family:'Jost',sans-serif; font-size:0.88rem; cursor:pointer; }
  .edit-delete { padding:13px 18px; background:none; color:var(--terra); border:1px solid var(--terra); border-radius:12px; font-family:'Jost',sans-serif; font-size:0.88rem; cursor:pointer; }
  .edit-cancel { padding:13px 18px; background:none; color:var(--muted); border:1px solid var(--border); border-radius:12px; font-family:'Jost',sans-serif; font-size:0.88rem; cursor:pointer; }
  .tl-block { cursor:pointer; }
  .tl-add-btn { position:absolute; bottom:-28px; left:50%; transform:translateX(-50%); font-size:0.62rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); background:none; border:none; cursor:pointer; white-space:nowrap; font-family:'Jost',sans-serif; }
  .tl-add-btn:active { color:var(--terra); }

  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--dark); color:white; font-size:0.78rem; padding:10px 18px; border-radius:20px; opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* SCHEDULE TIMELINE */
  .tl-outer { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .tl-wrap { display:flex; gap:0; min-width:340px; }
  .tl-times { flex-shrink:0; width:42px; padding-top:36px; position:relative; }
  .tl-time-label { font-size:0.58rem; color:var(--muted); text-align:right; padding-right:8px; position:absolute; transform:translateY(-50%); right:0; white-space:nowrap; }
  .tl-days { display:flex; flex:1; gap:4px; }
  .tl-day-col { flex:1; min-width:56px; display:flex; flex-direction:column; }
  .tl-day-header { text-align:center; font-size:0.65rem; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; padding:6px 4px; border-radius:8px; background:var(--dark); color:white; margin-bottom:4px; }
  .tl-day-header.today-h { background:var(--terra); }
  .tl-grid { position:relative; flex:1; }
  .tl-hour-line { position:absolute; left:0; right:0; border-top:1px solid var(--border); opacity:0.5; }
  .tl-block { position:absolute; left:2px; right:2px; border-radius:8px; padding:4px 6px; font-size:0.68rem; line-height:1.3; overflow:hidden; display:flex; flex-direction:column; justify-content:center; }
  .tl-block.normal { background:var(--card); border:1px solid var(--border); color:var(--dark); }
  .tl-block.brk { background:var(--bg); border:1px dashed var(--border); color:var(--muted); font-size:0.58rem; }
  .tl-block.hl { background:#eef2ff; border:1px solid #a0b4d8; color:#3a5a8a; }
  .tl-block.hort { background:#e8f5e9; border:1px solid #a5d6a7; color:#2e7d32; }
  .tl-block-icon { font-size:0.9rem; margin-bottom:1px; }
  .tl-block-name { font-weight:500; }
  .tl-block-time { font-size:0.55rem; opacity:0.7; margin-top:1px; }
  .sched-sunday { margin-top:20px; }
  .sched-sunday-title { font-size:0.62rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:8px; }
  .sched-sunday-item { display:flex; align-items:center; gap:12px; background:#eef2ff; border:1px solid #a0b4d8; border-radius:12px; padding:12px 14px; }
  .sched-sunday-icon { font-size:1.2rem; }
  .sched-sunday-text { font-size:0.88rem; color:var(--dark); font-weight:500; }
  .sched-sunday-time { font-size:0.72rem; color:var(--muted); }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="app-title">Our <em>Family</em></div>
    <div class="app-names">Andreas · Anna · Nadia</div>
  </div>
  <div class="sync-wrap">
    <div class="sync-dot" id="syncDot"></div>
    <span class="sync-label" id="syncLabel">connecting</span>
  </div>
</div>

<div class="main-tabs">
  <button class="main-tab active" id="tabShopping" onclick="showMain('shopping')">🛒 Shopping</button>
  <button class="main-tab" id="tabTasks" onclick="showMain('tasks')">✓ Tasks</button>
  <button class="main-tab" id="tabSchedule" onclick="showMain('schedule')">📅 Nadia</button>
  <button class="main-tab" id="tabLists" onclick="showMain('lists')">⚙ Lists</button>
</div>

<!-- SHOPPING -->
<div class="view active" id="shopping">
  <div class="basic-list-header">
    <div class="basic-list-title">🧺 Basic list</div>
    <div style="display:flex;gap:6px;">
      <button class="reset-btn" onclick="window.reinitBasicList()" style="background:none;border-color:var(--muted);color:var(--muted);">↻ Reset template</button>
      <button class="reset-btn" onclick="window.resetBasicList()">↺ Clear shopping list</button>
    </div>
  </div>
  <div id="basicList"></div>
  <div class="basic-divider"></div>
  <div class="add-row">
    <input class="add-input" id="shopInput" placeholder="Add item..." onkeydown="if(event.key==='Enter')window.addShop()">
    <button class="add-btn" onclick="window.addShop()">+</button>
  </div>
  <div class="basic-list-header">
    <div class="basic-list-title">➕ Extra items</div>
    <div class="section-count" id="shopCount">—</div>
  </div>
  <div id="shopList"></div>
  <button class="clear-btn" onclick="window.clearDoneShop()">Clear checked</button>
</div>

<!-- TASKS -->
<div class="view" id="tasks">
  <div class="cat-scroll" id="catScroll"></div>
  <div class="add-row">
    <input class="add-input" id="taskInput" placeholder="Add task..." onkeydown="if(event.key==='Enter')window.addTask()">
    <button class="add-btn" onclick="window.addTask()">+</button>
  </div>
  <div id="taskList"></div>
  <button class="clear-btn" onclick="window.clearDoneTasks()">Clear completed</button>
</div>

<!-- LISTS MANAGEMENT -->
<div class="view" id="lists">
  <div class="lists-head">Your Lists</div>
  <div id="listsManage"></div>
  <button class="add-list-btn" onclick="window.addList()">+ Add new list</button>
  <p class="lists-hint">Tap name to rename · tap colour square to change</p>
  <div style="margin-top:24px;border-top:1px solid var(--border);padding-top:16px;">
    <div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:8px;">Nadia's schedule</div>
    <button class="reset-btn" style="width:100%;padding:12px;border-radius:12px;font-size:0.82rem;" onclick="window.reinitSchedule()">↻ Reset schedule to default</button>
  </div>
</div>


<!-- SCHEDULE -->
<div class="view" id="schedule" style="padding:18px 16px 80px;">
  <div id="scheduleContent"></div>
</div>

<!-- COLOR MODAL -->
<div class="modal-overlay" id="colorModal">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Choose colour</div>
    <div class="color-grid" id="colorGrid"></div>
    <button class="modal-close" onclick="window.closeColorModal()">Done</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- EDIT SCHEDULE BLOCK MODAL -->
<div class="edit-modal-overlay" id="editBlockModal">
  <div class="edit-modal">
    <div class="edit-modal-title">Edit lesson</div>
    <div class="edit-field">
      <label class="edit-label">Subject</label>
      <input class="edit-input" id="editSubject" placeholder="e.g. Musik, Sport...">
    </div>
    <div class="edit-field">
      <label class="edit-label">Start time (e.g. 8:30)</label>
      <input class="edit-input" id="editStart" placeholder="8:30">
    </div>
    <div class="edit-field">
      <label class="edit-label">End time (e.g. 9:15)</label>
      <input class="edit-input" id="editEnd" placeholder="9:15">
    </div>
    <div class="edit-field">
      <label class="edit-label">Type</label>
      <select class="edit-select" id="editType">
        <option value="">Normal</option>
        <option value="break">Break / Pause</option>
        <option value="highlight">Highlight</option>
      </select>
    </div>
    <div class="edit-btns">
      <button class="edit-cancel" onclick="window.closeEditBlock()">Cancel</button>
      <button class="edit-delete" id="editDeleteBtn" onclick="window.deleteBlock()">Delete</button>
      <button class="edit-save" onclick="window.saveBlock()">Save</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc, query, orderBy, setDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7bnZmx-IJPcpEGzpDQRdJmZbMzQErs4E",
  authDomain: "family-project-8fc5d.firebaseapp.com",
  projectId: "family-project-8fc5d",
  storageBucket: "family-project-8fc5d.firebasestorage.app",
  messagingSenderId: "1091816333826",
  appId: "1:1091816333826:web:8db04f6dff4081a14f3d1b"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const PALETTE = ['#c4846a','#7a9e7e','#6a8caf','#b8836f','#9b8ea8','#c4a96a','#6aafaf','#af6a8c','#8ca86a','#a86a6a','#6a7aaf','#af9b6a'];

const DEFAULT_LISTS = [
  {id:'malysh', name:'Malysh', color:'#c4846a'},
  {id:'fishes', name:'Fishes', color:'#6a8caf'},
  {id:'home',   name:'Home',   color:'#7a9e7e'},
  {id:'admin',  name:'Admin',  color:'#9b8ea8'},
  {id:'trips',  name:'Trips',  color:'#c4a96a'},
];

let lists      = [];
let shopItems  = [];
let taskItems  = [];
let currentCat = 'all';
let colorTarget = null;

const toast = msg => {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
};
const sync = ok => {
  document.getElementById('syncDot').className='sync-dot'+(ok?'':' off');
  document.getElementById('syncLabel').textContent=ok?'synced':'offline';
};

// ── LISTS CONFIG ──
const configDoc = doc(db,'config','lists');

(async()=>{
  try {
    const snap = await getDoc(configDoc);
    if(!snap.exists()) await setDoc(configDoc,{items:DEFAULT_LISTS});
  } catch(e){}
})();

onSnapshot(configDoc, snap=>{
  if(snap.exists()){ lists=snap.data().items||[]; renderCatChips(); renderListsManage(); }
  sync(true);
},()=>sync(false));

const saveLists = () => setDoc(configDoc,{items:lists});

window.addList = async()=>{
  lists=[...lists,{id:'l_'+Date.now(),name:'New list',color:PALETTE[Math.floor(Math.random()*PALETTE.length)]}];
  await saveLists();
};

window.deleteList = async id=>{
  lists=lists.filter(l=>l.id!==id);
  await saveLists(); toast('Removed');
};

window.updateListName = async(id,name)=>{
  lists=lists.map(l=>l.id===id?{...l,name}:l);
  await saveLists();
};

window.updateListColor = async(id,color)=>{
  lists=lists.map(l=>l.id===id?{...l,color}:l);
  await saveLists();
};

// ── COLOR MODAL ──
window.openColor = id=>{
  colorTarget=id;
  const cur=lists.find(l=>l.id===id);
  document.getElementById('colorGrid').innerHTML=PALETTE.map(c=>`
    <div class="color-opt${cur&&cur.color===c?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`).join('');

  return createdAt && (Date.now() - createdAt) < 24 * 60 * 60 * 1000;
}

function updateTaskBadge() {
  const lastSeen = parseInt(localStorage.getItem('taskLastSeen')||'0');
  const newCount = taskItems.filter(i => !i.done && i.createdAt && i.createdAt > lastSeen).length;
  const tab = document.getElementById('tabTasks');

  const old = tab.querySelector('.tab-badge');
  if(old) old.remove();
  if(newCount > 0) {
    const badge = document.createElement('span');

    tab.appendChild(badge);
  }

function parseTime(t) {
  const [h,m] = t.split(':').map(Number);
  return h * 60 + (m||0);
}
function parseRange(range) {
  const parts = range.split(/[–-]/);
  return { start: parseTime(parts[0].trim()), end: parseTime(parts[1].trim()) };
}

function renderSchedule() {
  const el = document.getElementById('scheduleContent');
  const source = scheduleLoaded ? scheduleData : SCHEDULE;
  const todayJS = new Date().getDay();
  const weekDays = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
  const DAY_LABELS = ['Mo','Di','Mi','Do','Fr'];
  const START_MIN=8*60, END_MIN=17*60, PX_PER_MIN=2.2;
  const TOTAL_H=(END_MIN-START_MIN)*PX_PER_MIN;

  let timesHtml='';
  for(let m=START_MIN;m<=END_MIN;m+=30){
    const top=(m-START_MIN)*PX_PER_MIN;
    const hh=Math.floor(m/60), mm=m%60;
    timesHtml+=`<div class="tl-time-label" style="top:${top}px">${hh}:${mm===0?'00':mm}</div>`;
  }
  let linesHtml='';
  for(let m=START_MIN;m<=END_MIN;m+=60){
    linesHtml+=`<div class="tl-hour-line" style="top:${(m-START_MIN)*PX_PER_MIN}px"></div>`;
  }

  let daysHtml='';
  weekDays.forEach((day,i)=>{
    const jsDayMap=[1,2,3,4,5];
    const isToday=jsDayMap[i]===todayJS;
    const lessons = scheduleLoaded ? (scheduleData[day]||[]) : (SCHEDULE[day]||[]);
    let blocksHtml='';
    lessons.forEach(lesson=>{
      try {
        const {start,end}=parseRange(lesson.time);
        const top=(start-START_MIN)*PX_PER_MIN;
        const height=Math.max((end-start)*PX_PER_MIN-3,16);
        const subjectKey=lesson.subject.replace(' 🎸','');
        const icon=SUBJECT_ICONS[subjectKey]||'📌';
        const isHort=lesson.subject==='Hort';
        const isBreak=lesson.type==='break';
        const isHL=lesson.type==='highlight'&&!isHort;
        const cls=isHort?'hort':isBreak?'brk':isHL?'hl':'normal';
        const showTime=(end-start)>=30, showIcon=(end-start)>=25&&!isBreak;
        const clickHandler=lesson.id?`onclick="window.openEditBlock('${lesson.id}','${day}')"`:'' ;
        blocksHtml+=`<div class="tl-block ${cls}" style="top:${top}px;height:${height}px;" ${clickHandler}>
          ${showIcon?`<div class="tl-block-icon">${icon}</div>`:''}
          <div class="tl-block-name">${lesson.subject}</div>
          ${showTime?`<div class="tl-block-time">${lesson.time}</div>`:''}
        </div>`;
      } catch(e){}
    });

    daysHtml+=`<div class="tl-day-col">
      <div class="tl-day-header${isToday?' today-h':''}">${DAY_LABELS[i]}${isToday?' ·heute':''}</div>
      <div class="tl-grid" style="height:${TOTAL_H+30}px;position:relative;">
        ${linesHtml}${blocksHtml}
        <button class="tl-add-btn" onclick="window.openNewBlock('${day}')">+ add</button>
      </div>
    </div>`;
  });

  let html=`<div class="tl-outer"><div class="tl-wrap">
    <div class="tl-times" style="height:${TOTAL_H+66}px;position:relative;">${timesHtml}</div>
    <div class="tl-days">${daysHtml}</div>
  </div></div>`;

  // Saturday
  const saturdayLessons = scheduleLoaded?(scheduleData['Saturday']||[]):(SCHEDULE.Saturday||[]);
  const isSatToday = todayJS === 6;
  if(scheduleLoaded){
    html+=`<div class="sched-sunday"><div class="sched-sunday-title">Samstag${isSatToday?' <span style="font-size:0.6rem;background:var(--terra);color:white;border-radius:10px;padding:1px 7px;margin-left:6px;">heute</span>':''}</div>`;
    saturdayLessons.forEach(l=>{
      const icon=SUBJECT_ICONS[l.subject]||'📌';
      const clickHandler=l.id?`onclick="window.openEditBlock('${l.id}','Saturday')"`:'' ;
      html+=`<div class="sched-sunday-item" style="cursor:pointer;" ${clickHandler}>
        <span class="sched-sunday-icon">${icon}</span>
        <div><div class="sched-sunday-text">${l.subject}</div><div class="sched-sunday-time">${l.time}</div></div>
      </div>`;
    });
    html+=`<button class="add-task-btn" style="margin-top:8px" onclick="window.openNewBlock('Saturday')">+ add Saturday</button>`;
    html+='</div>';
  }

  // Sunday
  const sundayLessons = scheduleLoaded?(scheduleData['Sunday']||[]):(SCHEDULE.Sunday||[]);
  const isSunToday = todayJS === 0;
  if(sundayLessons.length||scheduleLoaded){
    html+=`<div class="sched-sunday"><div class="sched-sunday-title">Sonntag${isSunToday?' <span style="font-size:0.6rem;background:var(--terra);color:white;border-radius:10px;padding:1px 7px;margin-left:6px;">heute</span>':''}</div>`;
    sundayLessons.forEach(l=>{
      const icon=SUBJECT_ICONS[l.subject]||'📌';
      const clickHandler=l.id?`onclick="window.openEditBlock('${l.id}','Sunday')"`:'' ;
      html+=`<div class="sched-sunday-item" style="cursor:pointer;" ${clickHandler}>
        <span class="sched-sunday-icon">${icon}</span>
        <div><div class="sched-sunday-text">${l.subject}</div><div class="sched-sunday-time">${l.time}</div></div>
      </div>`;
    });
    if(scheduleLoaded) html+=`<button class="add-task-btn" style="margin-top:8px" onclick="window.openNewBlock('Sunday')">+ add Sunday</button>`;
    html+='</div>';
  }

  el.innerHTML=html;
}


window.showMain=view=>{
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(view).classList.add('active');
  document.getElementById('tab'+view.charAt(0).toUpperCase()+view.slice(1)).classList.add('active');
  if(view==='schedule') renderSchedule();
  if(view==='lists') renderListsManage();
  if(view==='tasks') { localStorage.setItem('taskLastSeen', Date.now().toString()); updateTaskBadge(); renderTasks(); }
};
</script>
</body>
